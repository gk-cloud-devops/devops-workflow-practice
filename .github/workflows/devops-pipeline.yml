name: Devops CI Pipeline

on:
  push:
    branches:
      - practice_linux

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Show Repo Files
        run: ls -la

      - name: Build Docker Image
        run: docker build -t gkclouddevops/gokul-nginx ./docker-project

          # - name: Run Cointainer 
          # run: docker run -d -p 8080:80 gokul-nginx

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin 
      - name: Push Docker Image
        run: docker push gkclouddevops/gokul-nginx

      - name: Deploy to Ec2
        uses: appleboy/ssh-action@v1.0.0
        with: 
         host: ${{ secrets.EC2_HOST }}
         username: ${{ secrets.EC2_USER }}
         key: ${{ secrets.EC2_SSH_KEY }}
         script: |
           sudo docker pull gkclouddevops/gokul-nginx
          sudo docker stop $(sudo docker ps -q) || true
         sudo docker rm $(sudo docker ps -aq) || true
        sudo docker run -d -p 80:80 --name gkcicd gkclouddevops/gokul-nginx:latest 


