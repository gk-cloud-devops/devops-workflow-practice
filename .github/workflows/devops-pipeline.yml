name: Devops CI Pipeline

on:
  push:
    branches:
      - practice_linux

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Show Repo Files
        run: ls -la

      - name: Build Docker Image
        run: docker build -t gokul-nginx ./docker-project

          # - name: Run Cointainer 
          # run: docker run -d -p 8080:80 gokul-nginx

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker_login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        
      - name: Push Docker Image
        run: docker push gkclouddevops/gokul-nginx 

